<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="alphabet.html" class="nav-link active">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../sentences/index.html" class="nav-link">Sentences</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>

<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="alphabet.html">Alphabet</a>
  <span>›</span>
  <span>Consonants</span>
</nav>

<main class="page-container">

    <section class="modules">
        <h1 class="page-title">హల్లులు — Consonants</h1>

        <!-- PLAY ALL BUTTON -->
        <button id="playAllBtn" class="play-all-btn">🔊 Play All Consonants</button>

        <!-- PROGRESS BAR -->
        <div id="playProgress" class="play-progress">
            <div id="playProgressBar" class="play-progress-bar"></div>
        </div>

        <p class="modules-subtitle">Grouped by articulation class for easier learning.</p>

        <div id="consonantsGrid"></div>
    </section>

</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../assets/js/script.js"></script>

<script>
async function loadConsonants() {
    const res = await fetch("data/letters.json");
    const letters = await res.json();

    const container = document.getElementById("consonantsGrid");
    const playAllList = [];

    // CATEGORY GROUPS
    const categories = {
        "Guttural (కంఠ్య)": ["ka", "kha", "ga", "gha", "nga"],
        "Palatal (తాలవ్య)": ["cha", "chha", "ja", "jha", "nya"],
        "Cerebral (మూర్థన్య)": ["tta", "ttha", "dda", "ddha", "nna"],
        "Dental (దంత్య)": ["ta", "tha", "da", "dha", "na"],
        "Labial (ఓష్ఠ్య)": ["pa", "pha", "ba", "bha", "ma"],
        "Semi‑vowels (అన్తస్థ)": ["ya", "ra", "la", "va"],
        "Sibilants & Aspirate": ["sha", "ssha", "sa", "ha", "lla", "ksha", "rra"]
    };




    for (const [title, keys] of Object.entries(categories)) {
        const section = document.createElement("div");
        section.className = "category-section";

        section.innerHTML = `<h2 class="category-title">${title}</h2>`;

        const grid = document.createElement("div");
        grid.className = "module-grid";

        keys.forEach(key => {
            const item = letters[key];
            if (!item) return;

            const hasAudio = !!item.audio;
            if (hasAudio) playAllList.push(`audio/${item.audio}`);

            const card = document.createElement("div");
            card.className = "module-card fade-slide";

            const audioHTML = hasAudio
                ? `
                <div class="audio-player" data-src="audio/${item.audio}">
                    <button class="play-btn">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="time-label">0:00</span>
                </div>`
                : "";

            card.innerHTML = `
                <h3>${item.telugu}</h3>
                <p>${item.english}</p>
                ${audioHTML}
                <a href="letter.html?name=${key}&from=consonants" class="learn-more">Learn More →</a>
            `;

            grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
    }

    if (window.initAudioPlayers) window.initAudioPlayers();

    document.getElementById("playAllBtn").addEventListener("click", () => {
        playAllWithProgress(playAllList);
    });
}

// PLAY ALL WITH PROGRESS BAR
function playAllWithProgress(list) {
    if (!list || list.length === 0) return;

    const progressBar = document.getElementById("playProgressBar");
    let index = 0;

    function playNext() {
        if (index >= list.length) {
            progressBar.style.width = "100%";
            return;
        }

        const audio = new Audio(list[index]);
        audio.play();

        const progress = ((index + 1) / list.length) * 100;
        progressBar.style.width = `${progress}%`;

        index++;
        audio.addEventListener("ended", playNext);
    }

    progressBar.style.width = "0%";
    playNext();
}

document.addEventListener("DOMContentLoaded", loadConsonants);
</script>

</body>
</html>
