<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Letter</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- ============================
     HEADER
============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../sentences/index.html" class="nav-link">Sentences</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="alphabet.html">Alphabet</a>
  <span>›</span>
  <span id="breadcrumbLetter">Letter</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container letter-page">
    <section id="letterContent"></section>
</main>


<!-- ============================
     FOOTER
============================= -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadLetter() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const container = document.getElementById("letterContent");
    const breadcrumbLabel = document.getElementById("breadcrumbLetter");

    if (!name) {
        container.innerHTML = "<p>No letter specified.</p>";
        return;
    }

    try {
        const res = await fetch("data/letters.json");
        const data = await res.json();
        const letter = data[name];

        if (!letter) {
            container.innerHTML = "<p>Letter not found.</p>";
            return;
        }

        // Update breadcrumb
        breadcrumbLabel.textContent = letter.telugu;

        container.innerHTML = `
            <h1 class="big-letter">${letter.telugu}</h1>
            <h2 class="letter-english">${letter.english}</h2>

            <div class="audio-player" data-src="../assets/audio/${letter.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            <h3>Example Words</h3>
            <ul class="word-list">
                ${
                    (letter.examples || [])
                        .map(ex => `<li>${ex.word} <span>— ${ex.meaning}</span></li>`)
                        .join("")
                }
            </ul>
        `;

        // Initialize audio players if available
        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading letter data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadLetter);
</script>

</body>
</html>
