<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Letter</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="alphabet.html">Alphabet</a>
        <a href="../words/index.html">Words</a>
        <a href="../numbers/index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="../grammar/index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container letter-page">
    <section id="letterContent"></section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
async function loadLetter() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const container = document.getElementById("letterContent");

    if (!name) {
        container.innerHTML = "<p>No letter specified.</p>";
        return;
    }

    try {
        const res = await fetch("data/letters.json");
        const data = await res.json();
        const letter = data[name];

        if (!letter) {
            container.innerHTML = "<p>Letter not found.</p>";
            return;
        }

        // Build breadcrumb AFTER loading letter
        buildBreadcrumb([
            { label: "Alphabet", link: "alphabet.html" },
            { label: letter.telugu }
        ]);

        container.innerHTML = `
            <h2 class="big-letter">${letter.telugu}</h2>
            <h3 class="letter-english">${letter.english}</h3>

            <div class="audio-player" data-src="../audio/${letter.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            <h3>Example Words</h3>
            <ul class="word-list">
                ${
                    (letter.examples || [])
                        .map(ex => `<li>${ex.word} <span>— ${ex.meaning}</span></li>`)
                        .join("")
                }
            </ul>
        `;

        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading letter data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadLetter);
</script>

</body>
</html>
