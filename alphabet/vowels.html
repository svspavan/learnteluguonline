<html lang="en">
<head>

    <!-- Global Styles -->

</head>

<body>

<!-- ============================
     HEADER
============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>

      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="alphabet.html">Alphabet</a>
  <span>›</span>
  <span>Vowels</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container">

    <section class="modules">
        <h1 class="page-title">అచ్చులు — Vowels</h1>
        <p class="modules-subtitle">Click a vowel to learn its sound and example words.</p>

        <div id="vowelsGrid" class="module-grid"></div>
    </section>

</main>


<!-- ============================

============================= -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadVowels() {
    const res = await fetch("data/letters.json");
    const letters = await res.json();

    const grid = document.getElementById("vowelsGrid");

    Object.keys(letters).forEach(key => {
        const item = letters[key];
        if (item.type !== "vowel") return;

        const card = document.createElement("a");
        card.href = `letter.html?name=${key}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${item.telugu}</h3>
            <p>${item.english}</p>
        `;
        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadVowels);
</script>

</body>
</html>
