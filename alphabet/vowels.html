<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadVowels() {
    try {
        const res = await fetch("data/letters.json");
        const letters = await res.json();

        const grid = document.getElementById("vowelsGrid");
        const playAllList = [];

        Object.keys(letters).forEach(key => {
            const item = letters[key];
            if (item.type !== "vowel") return;

            const hasAudio = !!item.audio;
            if (hasAudio) {
                playAllList.push(`audio/${item.audio}`);
            }

            const card = document.createElement("div");
            card.className = "module-card fade-slide";

            const audioHTML = hasAudio
                ? `
                <div class="audio-player" data-src="audio/${item.audio}">
                    <button class="play-btn">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="time-label">0:00</span>
                </div>
                `
                : "";

            card.innerHTML = `
                <h3>${item.telugu}</h3>
                <p>${item.english}</p>
                ${audioHTML}
                <a href="letter.html?name=${key}&from=vowels" class="learn-more">Learn More →</a>
            `;

            grid.appendChild(card);
        });

        if (window.initAudioPlayers) window.initAudioPlayers();

        const playAllBtn = document.getElementById("playAllBtn");
        playAllBtn.addEventListener("click", () => {
            playAllVowels(playAllList);
        });
    } catch (e) {
        console.error("Error loading vowels:", e);
        document.getElementById("vowelsGrid").innerHTML =
            "<p>Unable to load vowels right now.</p>";
    }
}

// Sequentially play all vowel audio files
function playAllVowels(list) {
    if (!list || list.length === 0) return;

    let index = 0;

    function playNext() {
        if (index >= list.length) return;

        const src = list[index];
        const audio = new Audio(src);
        index++;

        audio.addEventListener("ended", playNext);
        audio.play();
    }

    playNext();
}

document.addEventListener("DOMContentLoaded", loadVowels);
</script>
