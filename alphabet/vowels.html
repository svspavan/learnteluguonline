<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Vowels</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="alphabet.html">Alphabet</a>
        <a href="../words/index.html">Words</a>
        <a href="../numbers/index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="../grammar/index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container">
    <section class="modules">
        <h2>అచ్చులు — Vowels</h2>
        <p class="modules-subtitle">Click a vowel to learn its sound and example words.</p>

        <div id="vowelsGrid" class="module-grid"></div>
    </section>
</main>

<!-- Footer -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
async function loadVowels() {
    const res = await fetch("data/letters.json");
    const letters = await res.json();

    const grid = document.getElementById("vowelsGrid");

    Object.keys(letters).forEach(key => {
        const item = letters[key];
        if (item.type !== "vowel") return;

        const card = document.createElement("a");
        card.href = `letter.html?name=${key}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${item.telugu}</h3>
            <h4>${item.english}</h4>
        `;
        grid.appendChild(card);
    });

    buildBreadcrumb([
        { label: "Alphabet", link: "alphabet.html" },
        { label: "Vowels" }
    ]);
}

document.addEventListener("DOMContentLoaded", loadVowels);
</script>

</body>
</html>
