    <nav class="nav">

<!-- ============================

============================= -->

    <h1 id="categoryTitle" class="page-title"></h1>

    <div id="categoryGrid" class="module-grid"></div>

</main>

<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadCategory() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const titleMap = {
        colors: "రంగులు — Colors",
        animals: "జంతువులు — Animals",
        fruits: "పండ్లు — Fruits",
        vegetables: "కూరగాయలు — Vegetables",
        shapes: "ఆకారాలు — Shapes"
    };

    const title = titleMap[name] || "Category";
    document.getElementById("categoryTitle").textContent = title;
    document.getElementById("breadcrumbCategory").textContent = title;

    const res = await fetch(`data/${name}.json`);
    const items = await res.json();

    const grid = document.getElementById("categoryGrid");

    Object.keys(items).forEach(key => {
        const item = items[key];

        const card = document.createElement("a");
        card.href = `item.html?category=${name}&key=${key}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${item.telugu}</h3>
            <p>${item.english}</p>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadCategory);
</script>

</body>
