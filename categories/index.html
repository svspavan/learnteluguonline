<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Categories — వర్గాలు</title>

  <!-- Telugu Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

  <!-- Global Styles -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    .page-subtitle {
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      margin-bottom: 1.2rem;
    }

    .categories-search {
      margin: 1rem 0 1.5rem;
      text-align: center;
    }

    .categories-search input {
      width: 90%;
      max-width: 420px;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    /* Use the same grid system as Numbers: .module-grid */
    #categoriesGrid.module-grid {
      margin-top: 1rem;
    }

    /* Card content styling inside the shared module-card */
    #categoriesGrid .module-card {
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .category-icon {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .category-title {
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 1.3rem;
      margin: 0.3rem 0;
      font-weight: 700;
    }

    .category-subtitle {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-bottom: 0.3rem;
    }

    .category-desc {
      font-size: 0.85rem;
      opacity: 0.75;
      margin: 0;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../numbers/index.html" class="nav-link">Numbers</a>
      <a href="index.html" class="nav-link active">Categories</a>
      <a href="../sentences/index.html" class="nav-link">Sentences</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>

<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <span>Categories</span>
</nav>

<main class="page-container">
  <section class="modules">
    <h1 class="page-title">వర్గాలు — Categories</h1>
    <p class="page-subtitle">Explore 12 fun learning categories</p>

    <!-- Search -->
    <div class="categories-search">
      <input type="text" id="categorySearch" placeholder="Search categories...">
    </div>

    <!-- Categories Grid (reuse Numbers grid style) -->
    <div id="categoriesGrid" class="module-grid"></div>
  </section>
</main>

<footer class="footer">
  <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../assets/js/script.js"></script>

<script>
/* ============================
   CATEGORY LIST
============================= */
const categories = [
  {
    key: "colors",
    icon: "🎨",
    telugu: "రంగులు",
    english: "Colors",
    desc: "Learn the Telugu names of common colors used in daily life."
  },
  {
    key: "animals",
    icon: "🐾",
    telugu: "జంతువులు",
    english: "Animals",
    desc: "Discover animals and their Telugu names with simple examples."
  },
  {
    key: "fruits",
    icon: "🍎",
    telugu: "పండ్లు",
    english: "Fruits",
    desc: "Explore tasty fruits and learn how to say them in Telugu."
  },
  {
    key: "vegetables",
    icon: "🥕",
    telugu: "కూరగాయలు",
    english: "Vegetables",
    desc: "Learn everyday vegetables and their Telugu names."
  },
  {
    key: "shapes",
    icon: "🔺",
    telugu: "ఆకారాలు",
    english: "Shapes",
    desc: "Understand basic shapes and how to name them in Telugu."
  },
  {
    key: "toys",
    icon: "🧸",
    telugu: "బొమ్మలు",
    english: "Toys",
    desc: "Fun toys and their Telugu names for young learners."
  },
  {
    key: "household",
    icon: "🏠",
    telugu: "ఇంటి వస్తువులు",
    english: "Household Items",
    desc: "Common things found at home and how to say them in Telugu."
  },
  {
    key: "family",
    icon: "👨‍👩‍👦",
    telugu: "కుటుంబం",
    english: "Family",
    desc: "Learn Telugu words for family members and relationships."
  },
  {
    key: "bodyparts",
    icon: "🧍‍♂️",
    telugu: "శరీర భాగాలు",
    english: "Body Parts",
    desc: "Know the names of body parts in simple Telugu."
  },
  {
    key: "vehicles",
    icon: "🚗",
    telugu: "వాహనాలు",
    english: "Vehicles",
    desc: "Learn the Telugu names of vehicles you see every day."
  },
  {
    key: "nature",
    icon: "🌿",
    telugu: "ప్రకృతి",
    english: "Nature",
    desc: "Explore nature words like trees, plants, and natural things."
  },
  {
    key: "school",
    icon: "📚",
    telugu: "పాఠశాల వస్తువులు",
    english: "School Items",
    desc: "Learn the names of common school items in Telugu."
  }
];

/* ============================
   RENDER CATEGORIES
============================= */
function renderCategories(filter = "") {
  const grid = document.getElementById("categoriesGrid");
  grid.innerHTML = "";

  categories
    .filter(cat =>
      cat.telugu.includes(filter) ||
      cat.english.toLowerCase().includes(filter.toLowerCase())
    )
    .forEach(cat => {
      const card = document.createElement("a");
      card.href = `category.html?name=${encodeURIComponent(cat.key)}`;
      card.className = "module-card fade-slide";

      card.innerHTML = `
        <div class="category-icon">${cat.icon}</div>
        <h3 class="category-title">${cat.telugu}</h3>
        <p class="category-subtitle">${cat.english}</p>
        <p class="category-desc">${cat.desc}</p>
      `;

      grid.appendChild(card);
    });
}

/* ============================
   SEARCH HANDLER
============================= */
document.getElementById("categorySearch").addEventListener("input", e => {
  renderCategories(e.target.value.trim());
});

document.addEventListener("DOMContentLoaded", () => renderCategories());
</script>

</body>
</html>
