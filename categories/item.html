<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Item</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- ============================
     HEADER
============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../numbers/index.html" class="nav-link">Numbers</a>
      <a href="../categories/index.html" class="nav-link">Categories</a>
      <a href="../sentences/index.html" class="nav-link">Sentences</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="index.html">Categories</a>
  <span>›</span>
  <a id="breadcrumbCategoryLink" href="#">Category</a>
  <span>›</span>
  <span id="breadcrumbItem">Item</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container">
    <section id="itemContent"></section>
</main>


<!-- ============================
     FOOTER
============================= -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadItem() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");
    const key = params.get("key");
    const container = document.getElementById("itemContent");

    if (!category || !key) {
        container.innerHTML = "<p>Invalid item.</p>";
        return;
    }

    try {
        const res = await fetch(`data/${category}.json`);
        const data = await res.json();
        const item = data[key];

        if (!item) {
            container.innerHTML = "<p>Item not found.</p>";
            return;
        }

        // Update breadcrumb
        document.getElementById("breadcrumbCategoryLink").textContent = category;
        document.getElementById("breadcrumbCategoryLink").href = `category.html?name=${category}`;
        document.getElementById("breadcrumbItem").textContent = item.telugu;

        container.innerHTML = `
            <h1 class="big-letter">${item.telugu}</h1>
            <h2 class="letter-english">${item.english}</h2>

            ${item.image ? `<img src="../assets/images/${item.image}" class="item-image">` : ""}

            <div class="audio-player" data-src="../assets/audio/${item.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            ${
                item.example
                    ? `
                        <h3>Example</h3>
                        <p class="story-paragraph">${item.example}</p>
                        <p class="story-moral">${item.example_english}</p>
                      `
                    : ""
            }

            <div class="back-link">
                <a href="category.html?name=${category}">← Back to ${category}</a>
            </div>
        `;

        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading item data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadItem);
</script>

</body>
</html>
