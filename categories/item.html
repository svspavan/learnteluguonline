<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Item</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="../alphabet/alphabet.html">Alphabet</a>
        <a href="../words/index.html">Words</a>
        <a href="../numbers/index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="../grammar/index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container">
    <section id="itemContent"></section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
async function loadItem() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");
    const key = params.get("key");
    const container = document.getElementById("itemContent");

    if (!category || !key) {
        container.innerHTML = "<p>Invalid item.</p>";
        return;
    }

    try {
        const res = await fetch(`data/${category}.json`);
        const data = await res.json();
        const item = data[key];

        if (!item) {
            container.innerHTML = "<p>Item not found.</p>";
            return;
        }

        // Build breadcrumb AFTER loading item
        buildBreadcrumb([
            { label: "Categories", link: "index.html" },
            { label: category, link: `category.html?name=${category}` },
            { label: item.telugu }
        ]);

        container.innerHTML = `
            <h2 class="big-letter">${item.telugu}</h2>
            <h3 class="letter-english">${item.english}</h3>

            ${item.image ? `<img src="../images/${item.image}" class="item-image">` : ""}

            <div class="audio-player" data-src="../audio/${item.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            ${
                item.example
                    ? `
                        <h3>Example</h3>
                        <p class="story-paragraph">${item.example}</p>
                        <p class="story-moral">${item.example_english}</p>
                      `
                    : ""
            }

            <div class="back-link">
                <a href="category.html?name=${category}">← Back to ${category}</a>
            </div>
        `;

        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading item data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadItem);
</script>

</body>
</html>
