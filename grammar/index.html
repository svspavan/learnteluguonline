<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Grammar</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="../alphabet/alphabet.html">Alphabet</a>
        <a href="../words/index.html">Words</a>
        <a href="../numbers/index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container">
    <section class="modules">
        <h2>Telugu Grammar</h2>
        <p class="modules-subtitle">Learn grammar concepts with examples and explanations.</p>

        <div id="grammarGrid" class="module-grid"></div>
    </section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
const grammarTopics = [
    { key: "vibhaktulu", label: "Vibhaktulu (Cases)", telugu: "విభక్తులు" },
    { key: "tenses", label: "Tenses", telugu: "కాలములు" },
    { key: "verb_conjugation", label: "Verb Conjugation", telugu: "ధాతు రూపాలు" },
    { key: "sentence_structure", label: "Sentence Structure", telugu: "వాక్య నిర్మాణం" },
    { key: "sandhi", label: "Sandhi", telugu: "సంధులు" },
    { key: "samasam", label: "Samasam", telugu: "సమాసాలు" },
    { key: "pronouns", label: "Pronouns", telugu: "సర్వనామాలు" },
    { key: "gender", label: "Gender", telugu: "లింగాలు" },
    { key: "numbers", label: "Numbers", telugu: "వచనాలు" },
    { key: "adjectives", label: "Adjectives", telugu: "విశేషణాలు" },
    { key: "adverbs", label: "Adverbs", telugu: "క్రియావిశేషణాలు" }
];

function loadGrammarTopics() {
    const grid = document.getElementById("grammarGrid");

    grammarTopics.forEach(topic => {
        const card = document.createElement("a");
        card.href = `topic.html?name=${topic.key}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${topic.telugu}</h3>
            <h4>${topic.label}</h4>
        `;
        grid.appendChild(card);
    });

    buildBreadcrumb([
        { label: "Grammar", link: "index.html" }
    ]);
}

document.addEventListener("DOMContentLoaded", loadGrammarTopics);
</script>

</body>
</html>
