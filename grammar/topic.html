============================= -->

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadTopic() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    if (!name) {
        document.getElementById("topicContent").innerHTML = "<p>Invalid topic.</p>";
        return;
    }

    try {
        const res = await fetch(`data/${name}.json`);
        const data = await res.json();

        const container = document.getElementById("topicContent");

        // Update breadcrumb
        document.getElementById("breadcrumbTopic").textContent = data.title;

        // Render main title + description
        container.innerHTML = `
            <h1 class="page-title">${data.title}</h1>
            <p class="story-paragraph">${data.description}</p>
        `;

        // Render each grammar block
        data.items.forEach(item => {
            container.innerHTML += `
                <div class="padyam-block">
                    <h3>${item.heading}</h3>
                    <p class="story-paragraph">${item.explanation}</p>

                    ${
                        item.examples
                            ? `<ul class="word-list">
                                   ${item.examples.map(ex => `<li>${ex}</li>`).join("")}
                               </ul>`
                            : ""
                    }
                </div>
            `;
        });

    } catch (e) {
        document.getElementById("topicContent").innerHTML = "<p>Error loading topic data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadTopic);
</script>

</body>
