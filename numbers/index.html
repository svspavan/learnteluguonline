<!-- ============================

============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>

    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <span>Numbers</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container">

    <section class="modules">
        <h1 class="page-title">సంఖ్యలు — Numbers</h1>
        <p class="modules-subtitle">Click a number to learn pronunciation and example usage.</p>

        <div id="numbersGrid" class="module-grid"></div>
    </section>

</main>


<!-- ============================

============================= -->
<footer class="footer">

</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadNumbers() {
    const res = await fetch("data/numbers.json");
    const numbers = await res.json();

    const grid = document.getElementById("numbersGrid");

    Object.keys(numbers).forEach(num => {
        const item = numbers[num];

        const card = document.createElement("a");
        card.href = `number.html?num=${num}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${item.telugu}</h3>
            <p>${item.english}</p>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadNumbers);
</script>

</body>
