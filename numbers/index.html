<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Numbers</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="../alphabet/alphabet.html">Alphabet</a>
        <a href="../words/index.html">Words</a>
        <a href="index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="../grammar/index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container">
    <section class="modules">
        <h2>Telugu Numbers</h2>
        <p class="modules-subtitle">Click a number to learn pronunciation and examples.</p>

        <div id="numbersGrid" class="module-grid"></div>
    </section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
async function loadNumbers() {
    const res = await fetch("data/numbers.json");
    const numbers = await res.json();

    const grid = document.getElementById("numbersGrid");

    Object.keys(numbers).forEach(num => {
        const item = numbers[num];

        const card = document.createElement("a");
        card.href = `number.html?num=${num}`;
        card.className = "module-card";
        card.innerHTML = `
            <h3>${item.telugu}</h3>
            <h4>${item.english}</h4>
        `;

        grid.appendChild(card);
    });

    buildBreadcrumb([
        { label: "Numbers", link: "index.html" }
    ]);
}

document.addEventListener("DOMContentLoaded", loadNumbers);
</script>

</body>
</html>
