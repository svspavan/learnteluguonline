<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Padyam</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- ============================
     HEADER
============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../numbers/index.html" class="nav-link">Numbers</a>
      <a href="../categories/index.html" class="nav-link">Categories</a>
      <a href="../grammar/index.html" class="nav-link">Grammar</a>
      <a href="index.html" class="nav-link active">Padyalu</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="index.html">Padyalu</a>
  <span>›</span>
  <span id="breadcrumbTitle">Padyam</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container">
    <section id="padyamContent"></section>
</main>


<!-- ============================
     FOOTER
============================= -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadPadyam() {
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");

    const titleMap = {
        vemana: "వేమన శతకము — Vemana Satakam",
        sumati: "సుమతీ శతకము — Sumati Satakam"
    };

    if (!type || !titleMap[type]) {
        document.getElementById("padyamContent").innerHTML =
            "<p>Invalid padyam type.</p>";
        return;
    }

    // Update breadcrumb
    document.getElementById("breadcrumbTitle").textContent = titleMap[type];

    const res = await fetch(`data/${type}.json`);
    const data = await res.json();

    const container = document.getElementById("padyamContent");

    container.innerHTML = `<h1 class="page-title">${titleMap[type]}</h1>`;

    Object.keys(data).forEach(key => {
        const p = data[key];

        const linesHTML = p.lines.map(line => `<div>${line}</div>`).join("");
        const meaningHTML = p.meaning.map(m => `<li>${m}</li>`).join("");

        container.innerHTML += `
            <div class="padyam-block">
                <h3>${p.title}</h3>

                <div class="padyam-lines">
                    ${linesHTML}
                </div>

                <div class="audio-player" data-src="../assets/audio/${p.audio}">
                    <button class="play-btn">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="time-label">0:00</span>
                </div>

                <h4>Meaning</h4>
                <ul class="meaning-list">
                    ${meaningHTML}
                </ul>

                <p class="story-moral"><strong>Moral:</strong> ${p.moral}</p>
            </div>
        `;
    });

    if (window.initAudioPlayers) window.initAudioPlayers();
}

document.addEventListener("DOMContentLoaded", loadPadyam);
</script>

</body>
</html>
