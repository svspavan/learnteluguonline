<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Sentences</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">Learn Telugu Online</div>
    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="index.html">Sentences</a>
    </nav>
</header>

<nav class="breadcrumb" id="breadcrumb"></nav>

<main class="modules">
    <h2>Daily‑Use Telugu Sentences</h2>
    <p class="modules-subtitle">Click a category to explore sentences.</p>

    <div id="sentenceCategories" class="module-grid"></div>
</main>

<script>
async function loadSentenceCategories() {
    const res = await fetch("data/sentences.json");
    const data = await res.json();

    const grid = document.getElementById("sentenceCategories");

    Object.keys(data).forEach(cat => {
        const card = document.createElement("a");
        card.href = `sentence.html?category=${cat}`;
        card.className = "module-card";

        const labelMap = {
            greetings: "Greetings",
            home: "Home",
            school: "School",
            travel: "Travel",
            daily: "Daily Use",
            food: "Food"
        };

        card.innerHTML = `
            <h3>${labelMap[cat] || cat}</h3>
            <h4>${cat}</h4>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadSentenceCategories);
</script>

</body>
</html>
