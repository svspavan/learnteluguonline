     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadSentenceCategories() {
    const res = await fetch("data/sentences.json");
    const data = await res.json();

    const grid = document.getElementById("sentenceCategories");

    const labelMap = {
        greetings: "Greetings",
        home: "Home",
        school: "School",
        travel: "Travel",
        daily: "Daily Use",
        food: "Food & Eating",
        work: "Workplace",
        shopping: "Shopping",
        health: "Health",
        nature: "Nature"
    };

    Object.keys(data).forEach(cat => {
        const card = document.createElement("a");
        card.href = `sentence.html?category=${cat}`;
        card.className = "module-card";

        card.innerHTML = `
            <h3>${labelMap[cat] || cat}</h3>
            <p>${cat}</p>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadSentenceCategories);
</script>

</body>
