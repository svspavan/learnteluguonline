<!-- ============================

============================= -->

  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>

<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadSentences() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");

    const res = await fetch("data/sentences.json");
    const data = await res.json();

    const container = document.getElementById("sentenceContent");
    const sentences = data[category];

    if (!sentences) {
        container.innerHTML = "<p>Category not found.</p>";
        return;
    }

    const labelMap = {
        greetings: "Greetings",
        home: "Home",
        school: "School",
        travel: "Travel",
        daily: "Daily Use",
        food: "Food & Eating",
        work: "Workplace",
        shopping: "Shopping",
        health: "Health",
        nature: "Nature"
    };

    const categoryLabel = labelMap[category] || category;

    // Update breadcrumb
    document.getElementById("breadcrumbCategory").textContent = categoryLabel;

    // Title
    container.innerHTML = `<h1 class="page-title">${categoryLabel}</h1>`;

    // Render each sentence block
    Object.keys(sentences).forEach(key => {
        const s = sentences[key];

        container.innerHTML += `
            <div class="padyam-block">
                <h3>${s.telugu}</h3>
                <p>${s.english}</p>

                <div class="audio-player" data-src="../assets/audio/${s.audio}">
                    <button class="play-btn">▶</button>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="time-label">0:00</span>
                </div>

                <p><strong>Example:</strong> ${s.example}</p>
                <p><strong>Meaning:</strong> ${s.example_english}</p>
            </div>
        `;
    });

    // Initialize audio players
    if (window.initAudioPlayers) window.initAudioPlayers();
}

document.addEventListener("DOMContentLoaded", loadSentences);
</script>

</body>
</html>
