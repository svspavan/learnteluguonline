<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Stories</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../numbers/index.html" class="nav-link">Numbers</a>
      <a href="../categories/index.html" class="nav-link">Categories</a>
      <a href="../grammar/index.html" class="nav-link">Grammar</a>
      <a href="../padyam/index.html" class="nav-link">Padyalu</a>
      <a href="index.html" class="nav-link active">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>

<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <span>Stories</span>
</nav>

<main class="page-container">
    <section class="modules">
        <h1 class="page-title">Telugu Stories</h1>
        <p class="modules-subtitle">Simple stories with morals, audio, and meaning.</p>

        <div id="storiesGrid" class="module-grid"></div>
    </section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../assets/js/script.js"></script>

<script>
async function loadStories() {
    const res = await fetch("data/stories.json");
    const stories = await res.json();

    const grid = document.getElementById("storiesGrid");

    Object.keys(stories).forEach(key => {
        const s = stories[key];

        const card = document.createElement("a");
        card.href = `story.html?name=${key}`;
        card.className = "module-card";

        card.innerHTML = `
            <h3>${s.title}</h3>
            <p>${s.english_title}</p>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", loadStories);
</script>

</body>
</html>
