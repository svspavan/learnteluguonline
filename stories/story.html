<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story</title>

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="index.html" class="nav-link">Stories</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="../words/index.html" class="nav-link">Words</a>
      <a href="../numbers/index.html" class="nav-link">Numbers</a>
      <a href="../categories/index.html" class="nav-link">Categories</a>
      <a href="../grammar/index.html" class="nav-link">Grammar</a>
      <a href="../padyam/index.html" class="nav-link">Padyalu</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>

<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="index.html">Stories</a>
  <span>›</span>
  <span id="breadcrumbTitle">Story</span>
</nav>

<main class="page-container">
    <section id="storyContent"></section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../assets/js/script.js"></script>

<script>
async function loadStory() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    const res = await fetch("data/stories.json");
    const data = await res.json();
    const story = data[name];

    const container = document.getElementById("storyContent");

    if (!story) {
        container.innerHTML = "<p>Story not found.</p>";
        return;
    }

    document.getElementById("breadcrumbTitle").textContent = story.title;

    container.innerHTML = `
        <h1 class="page-title">${story.title}</h1>
        <h3>${story.english_title}</h3>

        ${story.image ? `<img src="../assets/images/${story.image}" class="story-image">` : ""}
        
        <div class="audio-player" data-src="../assets/audio/${story.audio}">
            <button class="play-btn">▶</button>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <span class="time-label">0:00</span>
        </div>
    `;

    story.paragraphs.forEach(p => {
        container.innerHTML += `<p class="story-paragraph">${p}</p>`;
    });

    container.innerHTML += `
        <h3>మూల్యం (Moral)</h3>
        <p class="story-moral">${story.moral}</p>
    `;

    if (window.initAudioPlayers) window.initAudioPlayers();
}

document.addEventListener("DOMContentLoaded", loadStory);
</script>

</body>
</html>
