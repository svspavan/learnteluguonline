<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telugu Word</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- Full H1 Header -->
<header class="header">
    <div class="logo">Learn Telugu Online</div>

    <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="../alphabet/alphabet.html">Alphabet</a>
        <a href="index.html">Words</a>
        <a href="../numbers/index.html">Numbers</a>
        <a href="../categories/index.html">Categories</a>
        <a href="../grammar/index.html">Grammar</a>
        <a href="../stories/index.html">Stories</a>
        <a href="../padyalu/index.html">Padyalu</a>
    </nav>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <div class="header-search">
        <input type="text" id="globalSearch"
               placeholder="Search letters, words, numbers, colors..."
               oninput="handleGlobalSearch(event)">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<!-- Breadcrumb -->
<nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Main Content -->
<main class="page-container">
    <section id="wordContent"></section>
</main>

<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>

<script src="../js/script.js"></script>

<script>
async function loadWord() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const container = document.getElementById("wordContent");

    if (!name) {
        container.innerHTML = "<p>No word specified.</p>";
        return;
    }

    try {
        const res = await fetch("data/words.json");
        const data = await res.json();
        const word = data[name];

        if (!word) {
            container.innerHTML = "<p>Word not found.</p>";
            return;
        }

        // Build breadcrumb AFTER loading word
        buildBreadcrumb([
            { label: "Words", link: "index.html" },
            { label: word.telugu }
        ]);

        container.innerHTML = `
            <h2 class="big-letter">${word.telugu}</h2>
            <h3 class="letter-english">${word.english}</h3>

            <div class="audio-player" data-src="../audio/${word.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            <h3>Example Sentence</h3>
            <p class="story-paragraph">${word.example}</p>
            <p class="story-moral">${word.example_english}</p>
        `;

        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading word data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadWord);
</script>

</body>
</html>
