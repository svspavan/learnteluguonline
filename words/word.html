<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Word</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<!-- ============================
     HEADER
============================= -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Learn Telugu Online</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <nav class="nav">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="../alphabet/alphabet.html" class="nav-link">Alphabet</a>
      <a href="index.html" class="nav-link">Words</a>
      <a href="../sentences/index.html" class="nav-link">Sentences</a>
      <a href="../stories/index.html" class="nav-link">Stories</a>
    </nav>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
  </div>
</header>


<!-- ============================
     BREADCRUMB
============================= -->
<nav class="breadcrumb">
  <a href="../index.html">Home</a>
  <span>›</span>
  <a href="index.html">Words</a>
  <span>›</span>
  <span id="breadcrumbWord">Word</span>
</nav>


<!-- ============================
     MAIN CONTENT
============================= -->
<main class="page-container">
    <section id="wordContent"></section>
</main>


<!-- ============================
     FOOTER
============================= -->
<footer class="footer">
    <p>© 2026 LearnTeluguOnline.com — Preserving Telugu Heritage</p>
</footer>


<!-- ============================
     GLOBAL SCRIPT
============================= -->
<script src="../assets/js/script.js"></script>

<!-- ============================
     PAGE-SPECIFIC SCRIPT
============================= -->
<script>
async function loadWord() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const container = document.getElementById("wordContent");
    const breadcrumbLabel = document.getElementById("breadcrumbWord");

    if (!name) {
        container.innerHTML = "<p>No word specified.</p>";
        return;
    }

    try {
        const res = await fetch("data/words.json");
        const data = await res.json();
        const word = data[name];

        if (!word) {
            container.innerHTML = "<p>Word not found.</p>";
            return;
        }

        // Update breadcrumb
        breadcrumbLabel.textContent = word.telugu;

        container.innerHTML = `
            <h1 class="big-letter">${word.telugu}</h1>
            <h2 class="letter-english">${word.english}</h2>

            <div class="audio-player" data-src="../assets/audio/${word.audio}">
                <button class="play-btn">▶</button>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="time-label">0:00</span>
            </div>

            <h3>Example Sentence</h3>
            <p class="story-paragraph">${word.example}</p>
            <p class="story-moral">${word.example_english}</p>
        `;

        if (window.initAudioPlayers) window.initAudioPlayers();

    } catch (e) {
        container.innerHTML = "<p>Error loading word data.</p>";
    }
}

document.addEventListener("DOMContentLoaded", loadWord);
</script>

</body>
</html>
